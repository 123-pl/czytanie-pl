<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Czytanie PL</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .canva-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }
    .canva-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .canva-aspect-ratio {
      padding-top: 133%; /* Dopasowanie proporcji strony Canvy */
    }
  </style>
</head>
<body>

  <div class="canva-container">
    <div class="canva-aspect-ratio"></div>
    <iframe src="https://my.canva.site/" allow="fullscreen"></iframe>
  </div>

</body>
</html>
